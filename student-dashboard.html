<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h2>Student Dashboard</h2>

    <!-- ===================== -->
    <!-- A) ACADEMIC SECTION -->
    <!-- ===================== -->
    <div class="section">
        <h3>📚 Academic Information</h3>
        <form>

            <label>College</label>
            <select>
                <option>Delhi University</option>
                <option>IIT Delhi</option>
                <option>JNU</option>
                <option>AIIMS</option>
                <option>Other</option>
            </select>

            <label>Year</label>
            <select>
                <option>I</option>
                <option>II</option>
                <option>III</option>
                <option>IV</option>
            </select>

            <label>Course</label>
            <select>
                <option>BA</option>
                <option>BSc</option>
                <option>BTech</option>
                <option>MBBS</option>
                <option>BCom</option>
                <option>MTech</option>
            </select>

        </form>
    </div>

    <!-- ===================== -->
    <!-- B) SLEEP SCHEDULE -->
    <!-- ===================== -->
    <div class="section">
    <h3>😴 Sleep Schedule</h3>

    <form>

        <!-- Sleep Time -->
        <label>Sleep Time</label>
        <div class="time-wrapper">
            <input type="number" min="1" max="12" placeholder="HH">
            <span>:</span>
            <input type="number" min="0" max="59" placeholder="MM">
            <select>
                <option>AM</option>
                <option>PM</option>
            </select>
        </div>

        <!-- Wake Time -->
        <label>Wake Up Time</label>
        <div class="time-wrapper">
            <input type="number" min="1" max="12" placeholder="HH">
            <span>:</span>
            <input type="number" min="0" max="59" placeholder="MM">
            <select>
                <option>AM</option>
                <option>PM</option>
            </select>
        </div>

    </form>
</div>

    <!-- ===================== -->
    <!-- C) NOISE CONTROL -->
    <!-- ===================== -->
    <div class="section">
        <h3>🔊 Noise Control Preferences</h3>
        <form>

            <label>Study Environment</label>
            <select>
                <option>Low voice preferred</option>
                <option>Medium voice acceptable</option>
                <option>High voice okay</option>
            </select>

            <label>Music Preference</label>
            <select>
                <option>Uses headphones (Most Preferred)</option>
                <option>Low volume on speaker is okay & sometimes loud</option>
                <option>Not appreciated if played loud music</option>
                <option>Perfectly fine to play loud music</option>
            </select>

        </form>
    </div>

    <!-- ===================== -->
    <!-- D) PHONE CALLS -->
    <!-- ===================== -->
    <div class="section">
        <h3>📞 Phone Call Preference</h3>
        <form>

            <label>Phone Call Behavior</label>
            <select>
                <option>Great if talk less</option>
                <option>Can adjust for long conversation</option>
                <option>Highly preferred if they settle it outside the room</option>
            </select>

        </form>
    </div>

    <!-- ===================== -->
    <!-- E) GUEST VISITS -->
    <!-- ===================== -->
    <div class="section">
        <h3>👥 Guest Visits per Month</h3>
        <form>

            <label>Select Range</label>
            <select>
                <option>0 - 3 (Low)</option>
                <option>5 - 10 (Moderate)</option>
                <option>10 - 15 (Maximum)</option>
            </select>

        </form>
    </div>

    <button style="margin-top:20px;">Save All Preferences</button>

</div>

</body>
</html>
