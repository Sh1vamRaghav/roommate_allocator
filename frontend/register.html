<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Roommate Allocator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="font-size:1.8rem;margin-bottom:8px;">🏠</div>
        <h1>Create account</h1>
        <p>Join as a student or admin</p>
      </div>

      <div id="alertBox"></div>

      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Your name" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(min. 6 characters)</span></label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" minlength="6" required>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="isAdmin"> Register as Admin
        </label>
      </div>

      <button class="btn" id="registerBtn" style="width:100%;justify-content:center;margin-top:4px;">
        Create account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const alertBox   = document.getElementById('alertBox');
    const registerBtn = document.getElementById('registerBtn');

    async function doRegister() {
      clearAlert(alertBox);
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('isAdmin').checked ? 'ADMIN' : 'STUDENT';

      if (!name || !email || !password) {
        showAlert(alertBox, 'Please fill in all fields.');
        return;
      }
      if (password.length < 6) {
        showAlert(alertBox, 'Password must be at least 6 characters.');
        return;
      }

      setLoading(registerBtn, true);
      const result = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ name, email, password, role }),
      });
      setLoading(registerBtn, false);

      if (!result || result.error || result.errors) {
        const msg = result?.errors?.[0]?.msg || result?.error || 'Registration failed. Please try again.';
        showAlert(alertBox, msg);
        return;
      }

      showAlert(alertBox, 'Account created! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    }

    registerBtn.addEventListener('click', doRegister);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doRegister();
    });
  </script>
</body>
</html>
