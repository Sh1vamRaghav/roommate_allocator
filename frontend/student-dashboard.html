<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Student Dashboard</h1>
      <button class="btn btn-danger logout-btn" style="float: right;">Logout</button>
    </header>
    
    <nav>
      <ul>
        <li><a href="#" class="nav-link" data-section="profile">Profile</a></li>
        <li><a href="#" class="nav-link" data-section="preferences">Preferences</a></li>
        <li><a href="#" class="nav-link" data-section="room">My Room</a></li>
      </ul>
    </nav>

    <div id="profile" class="section card active">
      <h2>Profile</h2>
      <form id="profileForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="prof_name" name="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="prof_email" name="email">
        </div>
        <button type="submit" class="btn">Update Profile</button>
      </form>
    </div>

    <div id="preferences" class="section card">
      <h2>Lifestyle Preferences</h2>
      <form id="prefsForm">
        <div class="form-group">
          <label>Sleep Time</label>
          <input type="time" name="sleep_time">
        </div>
        <div class="form-group">
          <label>Wake Time</label>
          <input type="time" name="wake_time">
        </div>
        <div class="form-group">
          <label>Study Noise Level (0-10)</label>
          <input type="number" name="preferred_study_noise_level" min="0" max="10">
        </div>
        <div class="form-group">
          <label>Guest Visits/Month (0-31)</label>
          <input type="number" name="guest_visits_per_month" min="0" max="31">
        </div>
        <div class="form-group">
          <label>Room Temp (°C, 15-30)</label>
          <input type="number" name="preferred_room_temperature" min="15" max="30">
        </div>
        <button type="submit" class="btn">Save Preferences</button>
      </form>
    </div>

    <div id="room" class="section card">
      <h2>Assigned Room</h2>
      <div id="roomInfo"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let currentUser;

    async function loadProfile() {
      const profile = await apiFetch('/profile');
      if (profile) {
        currentUser = profile;
        document.getElementById('prof_name').value = profile.name;
        document.getElementById('prof_email').value = profile.email;
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await apiFetch('/profile', { method: 'PUT', body: JSON.stringify(data) });
      loadProfile();
    });

    async function loadPreferences() {
      const prefs = await apiFetch('/preferences');
      const form = document.getElementById('prefsForm');
      Object.keys(prefs || {}).forEach(key => {
        const input = form.querySelector(`[name="${key}"]`);
        if (input) input.value = prefs[key];
      });
    }

    document.getElementById('prefsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await apiFetch('/preferences', { method: 'PUT', body: JSON.stringify(data) });
      loadPreferences();
    });

    async function loadMyRoom() {
      const roomData = await apiFetch('/my-room');
      const container = document.getElementById('roomInfo');
      if (roomData.message) {
        container.innerHTML = '<p>No room assigned yet. Ask admin to run allocation.</p>';
      } else {
        container.innerHTML = `
          <table>
            <tr><th>Room ID</th><td>${roomData.room_id}</td></tr>
            <tr><th>Capacity</th><td>${roomData.capacity}</td></tr>
            <tr><th>Roommate</th><td>${roomData.roommate_name || 'None yet'}</td></tr>
          </table>
        `;
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
      if (sectionId === 'profile') loadProfile();
      if (sectionId === 'preferences') loadPreferences();
      if (sectionId === 'room') loadMyRoom();
    }

    // Initial load
    showSection('profile');
  </script>
</body>
</html>
