version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: roommate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d  # auto-run schema.sql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: roommate_db
      DB_USER: postgres
      DB_PASS: password
      JWT_SECRET: supersecretkeychangeme
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./frontend:/frontend
    depends_on:
      - db

volumes:
    postgres_data:
